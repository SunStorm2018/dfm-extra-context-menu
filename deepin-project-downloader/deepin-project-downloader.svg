<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 项目下载器红色渐变背景 -->
    <linearGradient id="downloaderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f44336;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d32f2f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="512" cy="512" r="480" fill="url(#downloaderGradient)" />
  
  <!-- 下载图标 -->
  <g fill="#FFFFFF">
    <!-- 云/服务器（数据源） -->
    <g fill="none" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 280 280 
               C 280 240 320 200 380 200 
               C 400 200 420 210 440 220 
               C 460 180 520 160 580 180 
               C 640 200 680 250 680 300 
               C 720 310 740 350 720 400 
               L 320 400 
               C 280 400 260 360 280 320 
               C 270 300 270 290 280 280 Z" />
    </g>
    
    <!-- 向下箭头（下载方向）▼ -->
    <g fill="#FFFFFF">
      <!-- 箭杆（竖直矩形，短一点，和云有距离） -->
      <rect x="452" y="480" width="120" height="140" />
      
      <!-- 箭头头部 - 尖端朝下 ▼ -->
      <path d="M 392 620 
               L 632 620 
               L 512 780 
               Z" />
    </g>
    
    <!-- 底部接收区域/进度条 -->
    <g fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round">
      <line x1="320" y1="840" x2="320" y2="880" />
      <line x1="704" y1="840" x2="704" y2="880" />
      <line x1="320" y1="880" x2="704" y2="880" />
      <line x1="320" y1="860" x2="512" y2="860" stroke-width="32" opacity="0.8" />
    </g>
  </g>
</svg>
